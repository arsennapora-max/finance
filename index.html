<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Фінансовий трекер</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14; --surface: #141720; --surface2: #1c2030; --border: #252a3a;
    --income: #00e5a0; --expense: #ff4d6d; --accent: #6c63ff;
    --text: #e8eaf2; --muted: #5a6080; --arsen: #60a5fa; --lyuda: #f472b6; --card-r: 16px;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 0 0 60px; background-image: radial-gradient(ellipse 80% 50% at 50% -20%, #1a1f3a 0%, transparent 70%); }

  .sync-badge { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; color: var(--muted); }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background 0.4s; }
  .sync-dot.online { background: var(--income); box-shadow: 0 0 6px var(--income); }
  .sync-dot.syncing { background: #fbbf24; }
  .sync-dot.error { background: var(--expense); }

  header { padding: 32px 24px 0; display: flex; align-items: center; justify-content: space-between; max-width: 980px; margin: 0 auto; }
  .logo { font-family: 'Unbounded', sans-serif; font-size: 1.1rem; font-weight: 800; letter-spacing: -0.03em; background: linear-gradient(135deg, var(--income), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .month-label { font-size: 0.8rem; color: var(--muted); font-weight: 300; letter-spacing: 0.06em; text-transform: uppercase; }

  main { max-width: 980px; margin: 0 auto; padding: 28px 24px 0; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

  .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-r); padding: 22px 20px; position: relative; overflow: hidden; }
  .summary-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .summary-card.balance::before { background: linear-gradient(90deg, var(--accent), #a78bfa); }
  .summary-card.income-card::before { background: linear-gradient(90deg, var(--income), #34d399); }
  .summary-card.expense-card::before { background: linear-gradient(90deg, var(--expense), #fb7185); }
  .card-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 500; margin-bottom: 10px; }
  .card-amount { font-family: 'Unbounded', sans-serif; font-size: 1.45rem; font-weight: 600; letter-spacing: -0.04em; line-height: 1; }
  .balance .card-amount { color: var(--text); } .income-card .card-amount { color: var(--income); } .expense-card .card-amount { color: var(--expense); }
  .card-icon { position: absolute; right: 18px; top: 18px; font-size: 1.3rem; opacity: 0.35; }
  .person-split { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .person-pill { font-size: 0.67rem; padding: 3px 8px; border-radius: 20px; font-weight: 500; }
  .person-pill.arsen { background: rgba(96,165,250,0.15); color: var(--arsen); }
  .person-pill.lyuda { background: rgba(244,114,182,0.15); color: var(--lyuda); }

  .section-header { font-family: 'Unbounded', sans-serif; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 12px; }
  .add-section { grid-column: 1 / -1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-r); padding: 22px 24px; }
  .form-row { display: grid; grid-template-columns: 110px 105px 1fr 130px 110px 44px; gap: 10px; align-items: center; }
  .type-toggle, .person-toggle { display: flex; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); height: 44px; }
  .type-btn, .person-btn { flex: 1; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 500; background: transparent; color: var(--muted); transition: background 0.2s, color 0.2s; }
  .type-btn.active-income { background: rgba(0,229,160,0.18); color: var(--income); }
  .type-btn.active-expense { background: rgba(255,77,109,0.18); color: var(--expense); }
  .person-btn.active-arsen { background: rgba(96,165,250,0.18); color: var(--arsen); }
  .person-btn.active-lyuda { background: rgba(244,114,182,0.18); color: var(--lyuda); }
  input, select { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; height: 44px; padding: 0 14px; outline: none; transition: border-color 0.2s; width: 100%; }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }
  .add-btn { height: 44px; width: 44px; border-radius: 10px; border: none; background: linear-gradient(135deg, var(--accent), #a78bfa); color: #fff; font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .add-btn:hover { opacity: 0.85; }
  .add-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .bottom-grid { grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 300px; gap: 16px; }

  .month-filter { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .month-nav { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
  .month-nav:hover { border-color: var(--accent); }
  .month-nav-label { font-family: 'Unbounded', sans-serif; font-size: 0.72rem; font-weight: 600; color: var(--text); flex: 1; text-align: center; }
  .month-all-btn { font-size: 0.7rem; padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .month-all-btn.active { background: rgba(108,99,255,0.2); border-color: var(--accent); color: var(--text); }

  .filter-bar { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .filter-chip { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 0.74rem; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .filter-chip.active { background: rgba(108,99,255,0.2); border-color: var(--accent); color: var(--text); }
  .filter-chip.f-arsen.active { background: rgba(96,165,250,0.15); border-color: var(--arsen); color: var(--arsen); }
  .filter-chip.f-lyuda.active { background: rgba(244,114,182,0.15); border-color: var(--lyuda); color: var(--lyuda); }

  .transactions-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-r); padding: 22px; }
  .transactions-list { display: flex; flex-direction: column; gap: 8px; max-height: 360px; overflow-y: auto; padding-right: 4px; }
  .transactions-list::-webkit-scrollbar { width: 4px; }
  .transactions-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .tx-item { display: flex; align-items: center; gap: 10px; padding: 11px 13px; background: var(--surface2); border-radius: 10px; border: 1px solid var(--border); }
  .tx-item:hover .tx-delete { opacity: 1; }
  .tx-cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .tx-info { flex: 1; min-width: 0; }
  .tx-desc { font-size: 0.87rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-meta { font-size: 0.7rem; color: var(--muted); margin-top: 2px; display: flex; align-items: center; gap: 6px; }
  .tx-person-badge { font-size: 0.64rem; font-weight: 600; padding: 1px 6px; border-radius: 8px; }
  .tx-person-badge.arsen { background: rgba(96,165,250,0.2); color: var(--arsen); }
  .tx-person-badge.lyuda { background: rgba(244,114,182,0.2); color: var(--lyuda); }
  .tx-amount { font-family: 'Unbounded', sans-serif; font-size: 0.82rem; font-weight: 600; flex-shrink: 0; }
  .tx-amount.inc { color: var(--income); } .tx-amount.exp { color: var(--expense); }
  .tx-delete { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 0.85rem; opacity: 0; transition: opacity 0.2s; padding: 0 4px; flex-shrink: 0; }
  .tx-delete:hover { color: var(--expense); }
  .empty-state { text-align: center; color: var(--muted); font-size: 0.85rem; padding: 40px 0; font-style: italic; }

  .right-panels { display: flex; flex-direction: column; gap: 16px; }
  .chart-panel, .person-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-r); padding: 20px; }
  .cat-list { display: flex; flex-direction: column; gap: 9px; }
  .cat-row { display: flex; flex-direction: column; gap: 4px; }
  .cat-row-top { display: flex; justify-content: space-between; align-items: center; }
  .cat-name { font-size: 0.78rem; color: var(--text); }
  .cat-val { font-family: 'Unbounded', sans-serif; font-size: 0.68rem; color: var(--muted); }
  .bar-bg { height: 5px; background: var(--surface2); border-radius: 9px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 9px; transition: width 0.5s; }
  .person-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 1px solid var(--border); }
  .person-row:last-child { border-bottom: none; }
  .person-name-big { font-family: 'Unbounded', sans-serif; font-size: 0.82rem; font-weight: 600; }
  .person-name-big.arsen { color: var(--arsen); } .person-name-big.lyuda { color: var(--lyuda); }
  .person-stats { text-align: right; }
  .person-exp-val { font-family: 'Unbounded', sans-serif; font-size: 0.92rem; font-weight: 600; color: var(--expense); }
  .person-inc-val { font-size: 0.7rem; color: var(--income); margin-top: 2px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px 28px; max-width: 340px; width: 90%; text-align: center; }
  .modal-icon { font-size: 2.2rem; margin-bottom: 14px; }
  .modal-title { font-family: 'Unbounded', sans-serif; font-size: 0.95rem; font-weight: 700; margin-bottom: 8px; }
  .modal-desc { font-size: 0.85rem; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }
  .modal-desc strong { color: var(--text); }
  .modal-btns { display: flex; gap: 10px; }
  .modal-cancel { flex: 1; height: 44px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; cursor: pointer; }
  .modal-cancel:hover { color: var(--text); }
  .modal-confirm { flex: 1; height: 44px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--expense), #fb7185); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; }

  @media (max-width: 700px) {
    main { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr 1fr; gap: 8px; }
    .form-row .type-toggle, .form-row .person-toggle { grid-column: 1 / -1; }
    .form-row .add-btn { grid-column: 1 / -1; width: 100%; }
    .bottom-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-icon">🗑️</div>
    <div class="modal-title">Видалити транзакцію?</div>
    <div class="modal-desc" id="modalDesc"></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Скасувати</button>
      <button class="modal-confirm" onclick="confirmDelete()">Видалити</button>
    </div>
  </div>
</div>

<header>
  <div class="logo">🍁 ФІНАНСИ CA$</div>
  <div class="header-right">
    <div class="month-label" id="monthLabel"></div>
    <div class="sync-badge">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncText">підключення...</span>
    </div>
  </div>
</header>

<main>
  <div class="summary-card balance">
    <div class="card-icon">⚡</div>
    <div class="card-label">Баланс</div>
    <div class="card-amount" id="balanceAmt">$0</div>
  </div>
  <div class="summary-card income-card">
    <div class="card-icon">↑</div>
    <div class="card-label">Доходи</div>
    <div class="card-amount" id="incomeAmt">$0</div>
    <div class="person-split">
      <span class="person-pill arsen" id="arsenIncPill">Арсен $0</span>
      <span class="person-pill lyuda" id="lyudaIncPill">Люда $0</span>
    </div>
  </div>
  <div class="summary-card expense-card">
    <div class="card-icon">↓</div>
    <div class="card-label">Витрати</div>
    <div class="card-amount" id="expenseAmt">$0</div>
    <div class="person-split">
      <span class="person-pill arsen" id="arsenExpPill">Арсен $0</span>
      <span class="person-pill lyuda" id="lyudaExpPill">Люда $0</span>
    </div>
  </div>

  <div class="add-section">
    <div class="section-header">Нова транзакція</div>
    <div class="form-row">
      <div class="type-toggle">
        <button class="type-btn active-income" id="incBtn" onclick="setType('income')">+ Дохід</button>
        <button class="type-btn" id="expBtn" onclick="setType('expense')">− Витрата</button>
      </div>
      <input type="number" id="amountInput" placeholder="CA$" min="0" step="0.01">
      <input type="text" id="descInput" placeholder="Опис (напр. Groceries)">
      <select id="catSelect"></select>
      <div class="person-toggle">
        <button class="person-btn active-arsen" id="arsenBtn" onclick="setPerson('Арсен')">Арсен</button>
        <button class="person-btn" id="lyudaBtn" onclick="setPerson('Люда')">Люда</button>
      </div>
      <button class="add-btn" id="addBtn" onclick="addTransaction()">+</button>
    </div>
  </div>

  <div class="bottom-grid">
    <div class="transactions-panel">
      <div class="section-header">Транзакції</div>
      <div class="month-filter">
        <button class="month-nav" onclick="changeMonth(-1)">‹</button>
        <div class="month-nav-label" id="monthNavLabel">—</div>
        <button class="month-nav" onclick="changeMonth(1)">›</button>
        <button class="month-all-btn active" id="monthAllBtn" onclick="setAllMonths()">Всі</button>
      </div>
      <div class="filter-bar">
        <button class="filter-chip active" onclick="setFilter('all')" id="f-all">Всі</button>
        <button class="filter-chip f-arsen" onclick="setFilter('Арсен')" id="f-Арсен">Арсен</button>
        <button class="filter-chip f-lyuda" onclick="setFilter('Люда')" id="f-Люда">Люда</button>
        <button class="filter-chip" onclick="setFilter('income')" id="f-income">Доходи</button>
        <button class="filter-chip" onclick="setFilter('expense')" id="f-expense">Витрати</button>
      </div>
      <div class="transactions-list" id="txList">
        <div class="empty-state">Завантаження...</div>
      </div>
    </div>
    <div class="right-panels">
      <div class="person-panel">
        <div class="section-header">Хто скільки</div>
        <div class="person-row">
          <div class="person-name-big arsen">Арсен</div>
          <div class="person-stats">
            <div class="person-exp-val" id="arsenExpTotal">$0</div>
            <div class="person-inc-val" id="arsenIncTotal">дохід $0</div>
          </div>
        </div>
        <div class="person-row">
          <div class="person-name-big lyuda">Люда</div>
          <div class="person-stats">
            <div class="person-exp-val" id="lyudaExpTotal">$0</div>
            <div class="person-inc-val" id="lyudaIncTotal">дохід $0</div>
          </div>
        </div>
      </div>
      <div class="chart-panel">
        <div class="section-header">Категорії витрат</div>
        <div class="cat-list" id="catChart">
          <div style="color:var(--muted);font-size:0.78rem;font-style:italic;">Завантаження...</div>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyALEqyLR0LOSK7V1Gnq8BVUtUBU3k6fHTY",
  authDomain: "spendings-3b6bb.firebaseapp.com",
  databaseURL: "https://spendings-3b6bb-default-rtdb.firebaseio.com",
  projectId: "spendings-3b6bb",
  storageBucket: "spendings-3b6bb.firebasestorage.app",
  messagingSenderId: "813486817421",
  appId: "1:813486817421:web:34524e0ee566c7866ca2c4"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const txRef = db.ref('transactions');

const CATS_INCOME  = ['Зарплата','Фріланс','Інвестиції','Подарунок','Інше'];
const CATS_EXPENSE = ['Groceries','Ресторани','Транспорт','Житло & Utilities','Одяг','Здоров\'я','Розваги','Освіта','Технології','Спорт','Інше'];
const CAT_COLORS = {
  'Groceries':'#34d399','Ресторани':'#f472b6','Транспорт':'#60a5fa','Житло & Utilities':'#a78bfa',
  'Одяг':'#f9a8d4','Здоров\'я':'#2dd4bf','Розваги':'#fb923c','Освіта':'#fbbf24',
  'Технології':'#818cf8','Спорт':'#4ade80','Інше':'#9ca3af',
  'Зарплата':'#00e5a0','Фріланс':'#6ee7b7','Інвестиції':'#a7f3d0','Подарунок':'#d1fae5'
};

let transactions = [];
let currentType = 'income';
let currentPerson = 'Арсен';
let currentFilter = 'all';
let pendingDeleteKey = null;
const now = new Date();
let viewYear = now.getFullYear(), viewMonth = now.getMonth(), showAllMonths = true;

function setSyncStatus(s, t) {
  document.getElementById('syncDot').className = 'sync-dot ' + s;
  document.getElementById('syncText').textContent = t;
}

// Firebase слухач
txRef.on('value', function(snap) {
  transactions = [];
  if (snap.exists()) {
    snap.forEach(function(child) {
      var item = child.val();
      transactions.push({
        firebaseKey: child.key,
        type: item.type || 'expense',
        amount: Number(item.amount) || 0,
        description: item.description || '',
        category: item.category || 'Інше',
        person: item.person || 'Арсен',
        date: item.date || '',
        ts: Number(item.ts) || 0
      });
    });
  }
  transactions.sort(function(a,b){ return b.ts - a.ts; });
  setSyncStatus('online', 'синхронізовано ✓ (' + transactions.length + ')');
  render();
}, function(err) {
  setSyncStatus('error', 'помилка з\'єднання');
  console.error(err);
});

function inSelectedMonth(t) {
  if (showAllMonths) return true;
  if (!t.ts) return true;
  var d = new Date(t.ts);
  return d.getFullYear() === viewYear && d.getMonth() === viewMonth;
}

function monthName(y, m) {
  return new Date(y, m, 1).toLocaleDateString('uk-UA', {month:'long', year:'numeric'}).toUpperCase();
}

function updateMonthNav() {
  document.getElementById('monthNavLabel').textContent = showAllMonths ? 'УСІ МІСЯЦІ' : monthName(viewYear, viewMonth);
  document.getElementById('monthAllBtn').classList.toggle('active', showAllMonths);
}

function changeMonth(d) {
  showAllMonths = false;
  viewMonth += d;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  updateMonthNav(); render();
}

function setAllMonths() {
  showAllMonths = !showAllMonths;
  updateMonthNav(); render();
}

function addTransaction() {
  var amt = parseFloat(document.getElementById('amountInput').value);
  var desc = document.getElementById('descInput').value.trim();
  var cat = document.getElementById('catSelect').value;
  if (!amt || amt <= 0) { shake('amountInput'); return; }
  if (!desc) { shake('descInput'); return; }

  var btn = document.getElementById('addBtn');
  btn.disabled = true;
  btn.textContent = '...';
  setSyncStatus('syncing', 'збереження...');

  txRef.push({
    type: currentType,
    amount: amt,
    description: desc,
    category: cat,
    person: currentPerson,
    date: new Date().toLocaleDateString('uk-UA', {day:'2-digit', month:'short'}),
    ts: Date.now()
  }).then(function() {
    document.getElementById('amountInput').value = '';
    document.getElementById('descInput').value = '';
  }).catch(function(e) {
    setSyncStatus('error', 'не вдалося зберегти');
    alert('Помилка збереження: ' + e.message);
  }).finally(function() {
    btn.disabled = false;
    btn.textContent = '+';
  });
}

function deleteTransaction(key, desc, amount) {
  pendingDeleteKey = key;
  document.getElementById('modalDesc').innerHTML = 'Ви впевнені що хочете видалити<br><strong>' + escHtml(desc) + '</strong> (' + amount + ')?';
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  pendingDeleteKey = null;
  document.getElementById('modalOverlay').classList.remove('show');
}

function confirmDelete() {
  if (!pendingDeleteKey) return;
  var key = pendingDeleteKey;
  closeModal();
  setSyncStatus('syncing', 'видалення...');
  db.ref('transactions/' + key).remove().catch(function(e) {
    setSyncStatus('error', 'не вдалося видалити');
  });
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === e.currentTarget) closeModal();
});

function setType(t) {
  currentType = t;
  document.getElementById('incBtn').className = 'type-btn' + (t==='income' ? ' active-income' : '');
  document.getElementById('expBtn').className = 'type-btn' + (t==='expense' ? ' active-expense' : '');
  populateCats();
}

function setPerson(p) {
  currentPerson = p;
  document.getElementById('arsenBtn').className = 'person-btn' + (p==='Арсен' ? ' active-arsen' : '');
  document.getElementById('lyudaBtn').className = 'person-btn' + (p==='Люда' ? ' active-lyuda' : '');
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(function(c) { c.classList.remove('active'); });
  var el = document.getElementById('f-' + f);
  if (el) el.classList.add('active');
  renderTxList();
}

function populateCats() {
  var cats = currentType === 'income' ? CATS_INCOME : CATS_EXPENSE;
  document.getElementById('catSelect').innerHTML = cats.map(function(c){ return '<option>' + c + '</option>'; }).join('');
}

function shake(id) {
  var el = document.getElementById(id);
  el.style.borderColor = 'var(--expense)';
  setTimeout(function(){ el.style.borderColor = ''; }, 800);
}

function fmt(n) { return '$' + n.toLocaleString('en-CA', {minimumFractionDigits:0, maximumFractionDigits:2}); }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderTxList() {
  var filtered = transactions.filter(inSelectedMonth);
  if (currentFilter === 'Арсен') filtered = filtered.filter(function(t){ return t.person === 'Арсен'; });
  else if (currentFilter === 'Люда') filtered = filtered.filter(function(t){ return t.person === 'Люда'; });
  else if (currentFilter === 'income') filtered = filtered.filter(function(t){ return t.type === 'income'; });
  else if (currentFilter === 'expense') filtered = filtered.filter(function(t){ return t.type === 'expense'; });

  var list = document.getElementById('txList');
  if (!filtered.length) { list.innerHTML = '<div class="empty-state">Транзакцій не знайдено ✨</div>'; return; }
  list.innerHTML = filtered.map(function(t) {
    return '<div class="tx-item">' +
      '<div class="tx-cat-dot" style="background:' + (CAT_COLORS[t.category]||'#888') + '"></div>' +
      '<div class="tx-info">' +
        '<div class="tx-desc">' + escHtml(t.description) + '</div>' +
        '<div class="tx-meta">' +
          '<span class="tx-person-badge ' + (t.person==='Арсен'?'arsen':'lyuda') + '">' + t.person + '</span>' +
          t.category + ' · ' + t.date +
        '</div>' +
      '</div>' +
      '<div class="tx-amount ' + (t.type==='income'?'inc':'exp') + '">' + (t.type==='income'?'+':'−') + fmt(t.amount) + '</div>' +
      '<button class="tx-delete" onclick="deleteTransaction(\'' + t.firebaseKey + '\',\'' + escHtml(t.description) + '\',\'' + (t.type==='income'?'+':'-') + fmt(t.amount) + '\')" title="Видалити">✕</button>' +
    '</div>';
  }).join('');
}

function render() {
  var vis = transactions.filter(inSelectedMonth);

  function sum(p, type) {
    return vis.filter(function(t){ return (!p || t.person===p) && t.type===type; })
              .reduce(function(s,t){ return s+t.amount; }, 0);
  }

  var ti = sum(null,'income'), te = sum(null,'expense');
  document.getElementById('incomeAmt').textContent = fmt(ti);
  document.getElementById('expenseAmt').textContent = fmt(te);
  var bal = ti - te;
  var be = document.getElementById('balanceAmt');
  be.textContent = (bal<0?'-':'') + fmt(Math.abs(bal));
  be.style.color = bal>=0 ? 'var(--text)' : 'var(--expense)';

  var ai=sum('Арсен','income'), ae=sum('Арсен','expense');
  var li=sum('Люда','income'),  le=sum('Люда','expense');
  document.getElementById('arsenIncPill').textContent = 'Арсен ' + fmt(ai);
  document.getElementById('lyudaIncPill').textContent = 'Люда ' + fmt(li);
  document.getElementById('arsenExpPill').textContent = 'Арсен ' + fmt(ae);
  document.getElementById('lyudaExpPill').textContent = 'Люда ' + fmt(le);
  document.getElementById('arsenExpTotal').textContent = fmt(ae);
  document.getElementById('arsenIncTotal').textContent = 'дохід ' + fmt(ai);
  document.getElementById('lyudaExpTotal').textContent = fmt(le);
  document.getElementById('lyudaIncTotal').textContent = 'дохід ' + fmt(li);

  var catMap = {};
  vis.filter(function(t){ return t.type==='expense'; }).forEach(function(t){
    catMap[t.category] = (catMap[t.category]||0) + t.amount;
  });
  var entries = Object.entries(catMap).sort(function(a,b){ return b[1]-a[1]; });
  var cc = document.getElementById('catChart');
  if (!entries.length) {
    cc.innerHTML = '<div style="color:var(--muted);font-size:0.78rem;font-style:italic;">Дані з\'являться після додавання витрат</div>';
  } else {
    var mx = entries[0][1];
    cc.innerHTML = entries.map(function(e) {
      return '<div class="cat-row"><div class="cat-row-top"><span class="cat-name">' + e[0] + '</span><span class="cat-val">' + fmt(e[1]) + '</span></div>' +
        '<div class="bar-bg"><div class="bar-fill" style="width:' + (e[1]/mx*100).toFixed(1) + '%;background:' + (CAT_COLORS[e[0]]||'#888') + '"></div></div></div>';
    }).join('');
  }

  renderTxList();
}

document.getElementById('monthLabel').textContent = now.toLocaleDateString('uk-UA', {month:'long', year:'numeric'});
updateMonthNav();
populateCats();
</script>
</body>
</html>
